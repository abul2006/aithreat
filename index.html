<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Insider Threat Detection System</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            color: #b0b0b0;
            font-size: 1.1rem;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ecdc4;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .card h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .metric-card {
            text-align: center;
        }
        
        .metric-value {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .metric-label {
            color: #b0b0b0;
            font-size: 0.9rem;
        }
        
        .critical { color: #ff6b6b; }
        .high { color: #ffa500; }
        .medium { color: #ffeb3b; }
        .low { color: #4ecdc4; }
        
        .alert-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid;
            transition: all 0.3s ease;
        }
        
        .alert-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }
        
        .alert-item.CRITICAL { border-left-color: #ff6b6b; }
        .alert-item.HIGH { border-left-color: #ffa500; }
        .alert-item.MEDIUM { border-left-color: #ffeb3b; }
        .alert-item.LOW { border-left-color: #4ecdc4; }
        
        .user-risk-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .user-risk-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .risk-score {
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(45deg, #ffa500, #ff7675);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #b0b0b0;
        }
        
        .loading i {
            font-size: 2rem;
            margin-bottom: 10px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .timestamp {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .notification.success {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
        }
        
        .notification.error {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
        }
        
        .notification.warning {
            background: linear-gradient(45deg, #ffa500, #ff7675);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // API Configuration
        const API_BASE_URL = '/api';

        // Utility function to format timestamps
        const formatTimestamp = (timestamp) => {
            return new Date(timestamp).toLocaleString();
        };

        // Utility function to get risk score color
        const getRiskScoreColor = (score) => {
            if (score >= 0.8) return '#ff6b6b';
            if (score >= 0.6) return '#ffa500';
            if (score >= 0.4) return '#ffeb3b';
            return '#4ecdc4';
        };

        // Notification Component
        const Notification = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 5000);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div className={`notification ${type}`}>
                    <i className="fas fa-bell"></i> {message}
                </div>
            );
        };

        // Chart Component for Activity Timeline
        const ActivityChart = ({ data }) => {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !data || data.length === 0) return;

                // Destroy existing chart
                if (chartRef.current) {
                    chartRef.current.destroy();
                }

                const ctx = canvasRef.current.getContext('2d');
                
                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(item => `${item.hour}:00`),
                        datasets: [{
                            label: 'Activity Count',
                            data: data.map(item => item.count),
                            borderColor: '#4ecdc4',
                            backgroundColor: 'rgba(78, 205, 196, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#4ecdc4',
                            pointBorderColor: '#ffffff',
                            pointBorderWidth: 2,
                            pointRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#ffffff'
                                }
                            }
                        },
                        scales: {
                            x: {
                                ticks: {
                                    color: '#b0b0b0'
                                },
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.1)'
                                }
                            },
                            y: {
                                ticks: {
                                    color: '#b0b0b0'
                                },
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.1)'
                                }
                            }
                        }
                    }
                });

                return () => {
                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }
                };
            }, [data]);

            return <canvas ref={canvasRef}></canvas>;
        };

        // Main Dashboard Component
        const InsiderThreatDashboard = () => {
            const [dashboardData, setDashboardData] = useState(null);
            const [alerts, setAlerts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [notification, setNotification] = useState(null);

            const showNotification = (message, type) => {
                setNotification({ message, type });
            };

            const hideNotification = () => {
                setNotification(null);
            };

            // Fetch dashboard data
            const fetchDashboardData = useCallback(async () => {
                try {
                    const response = await fetch(`http://127.0.0.1:5000/dashboard`);
                    if (response.ok) {
                        const data = await response.json();
                        setDashboardData(data);
                    }
                } catch (error) {
                    console.error('Error fetching dashboard data:', error);
                    showNotification('Error fetching dashboard data', 'error');
                }
            }, []);

            // Fetch alerts
            const fetchAlerts = useCallback(async () => {
                try {
                    const response = await fetch(`http://127.0.0.1:5000/alerts?limit=20`);
                    if (response.ok) {
                        const data = await response.json();
                        setAlerts(data);
                    }
                } catch (error) {
                    console.error('Error fetching alerts:', error);
                    showNotification('Error fetching alerts', 'error');
                }
            }, []);

            // Simulate different threat scenarios
            const simulateScenario = async (scenario) => {
                setLoading(true);
                try {
                    const response = await fetch(`http://127.0.0.1:5000/simulate`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            scenario: scenario,
                            user_id: `demo.${scenario}`
                        })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        showNotification(
                            `${scenario} scenario simulated! Risk Score: ${(result.risk_score * 100).toFixed(1)}%`,
                            result.threat_level === 'CRITICAL' ? 'error' : result.threat_level === 'HIGH' ? 'warning' : 'success'
                        );
                        
                        // Refresh data
                        await fetchDashboardData();
                        await fetchAlerts();
                    }
                } catch (error) {
                    console.error('Error simulating scenario:', error);
                    showNotification('Error simulating scenario', 'error');
                } finally {
                    setLoading(false);
                }
            };

            // Initial data load
            useEffect(() => {
                const loadData = async () => {
                    setLoading(true);
                    await Promise.all([fetchDashboardData(), fetchAlerts()]);
                    setLoading(false);
                };
                
                loadData();
                
                // Set up auto-refresh every 30 seconds
                const interval = setInterval(() => {
                    fetchDashboardData();
                    fetchAlerts();
                }, 30000);
                
                return () => clearInterval(interval);
            }, [fetchDashboardData, fetchAlerts]);

            if (loading && !dashboardData) {
                return (
                    <div className="container">
                        <div className="loading">
                            <i className="fas fa-spinner"></i>
                            <p>Loading AI Threat Detection System...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container">
                    {notification && (
                        <Notification
                            message={notification.message}
                            type={notification.type}
                            onClose={hideNotification}
                        />
                    )}
                    
                    <div className="header">
                        <h1>
                            <i className="fas fa-shield-alt"></i>
                            AI Insider Threat Detection System
                            <span className="status-indicator"></span>
                        </h1>
                        <p>Advanced behavioral analytics and machine learning for insider threat detection</p>
                        <p><strong>Status:</strong> {dashboardData?.system_status || 'ACTIVE'} • Last Updated: {new Date().toLocaleTimeString()}</p>
                    </div>

                    <div className="controls">
                        <button 
                            className="btn btn-primary" 
                            onClick={() => simulateScenario('normal')}
                            disabled={loading}
                        >
                            <i className="fas fa-user"></i>
                            Normal Activity
                        </button>
                        <button 
                            className="btn btn-warning" 
                            onClick={() => simulateScenario('data_exfiltration')}
                            disabled={loading}
                        >
                            <i className="fas fa-download"></i>
                            Data Exfiltration
                        </button>
                        <button 
                            className="btn btn-danger" 
                            onClick={() => simulateScenario('insider_sabotage')}
                            disabled={loading}
                        >
                            <i className="fas fa-bomb"></i>
                            Insider Sabotage
                        </button>
                        <button 
                            className="btn btn-warning" 
                            onClick={() => simulateScenario('credential_misuse')}
                            disabled={loading}
                        >
                            <i className="fas fa-key"></i>
                            Credential Misuse
                        </button>
                    </div>

                    <div className="dashboard-grid">
                        <div className="card metric-card">
                            <h3><i className="fas fa-exclamation-triangle critical"></i>Critical Alerts</h3>
                            <div className="metric-value critical">
                                {dashboardData?.alert_summary?.CRITICAL || 0}
                            </div>
                            <div className="metric-label">Last 24 Hours</div>
                        </div>

                        <div className="card metric-card">
                            <h3><i className="fas fa-exclamation-circle high"></i>High Risk</h3>
                            <div className="metric-value high">
                                {dashboardData?.alert_summary?.HIGH || 0}
                            </div>
                            <div className="metric-label">Active Incidents</div>
                        </div>

                        <div className="card metric-card">
                            <h3><i className="fas fa-info-circle medium"></i>Medium Risk</h3>
                            <div className="metric-value medium">
                                {dashboardData?.alert_summary?.MEDIUM || 0}
                            </div>
                            <div className="metric-label">Under Investigation</div>
                        </div>

                        <div className="card metric-card">
                            <h3><i className="fas fa-check-circle low"></i>Total Monitored</h3>
                            <div className="metric-value low">
                                {dashboardData?.total_alerts_24h || 0}
                            </div>
                            <div className="metric-label">Activities Analyzed</div>
                        </div>
                    </div>

                    <div className="dashboard-grid">
                        <div className="card">
                            <h3><i className="fas fa-users"></i>Top Risk Users</h3>
                            {dashboardData?.risky_users?.length > 0 ? (
                                dashboardData.risky_users.map((user, index) => (
                                    <div key={index} className="user-risk-item">
                                        <div>
                                            <strong>{user.user_id}</strong>
                                            <div style={{fontSize: '0.8rem', color: '#b0b0b0'}}>
                                                {user.activity_count} activities
                                            </div>
                                        </div>
                                        <div 
                                            className="risk-score"
                                            style={{
                                                background: getRiskScoreColor(user.avg_risk_score),
                                                color: 'white'
                                            }}
                                        >
                                            {(user.avg_risk_score * 100).toFixed(1)}%
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <p style={{color: '#b0b0b0', textAlign: 'center', padding: '20px'}}>
                                    No risk data available
                                </p>
                            )}
                        </div>

                        <div className="card">
                            <h3><i className="fas fa-chart-line"></i>Activity Timeline (24h)</h3>
                            <div className="chart-container">
                                {dashboardData?.hourly_activity ? (
                                    <ActivityChart data={dashboardData.hourly_activity} />
                                ) : (
                                    <div style={{textAlign: 'center', padding: '50px', color: '#b0b0b0'}}>
                                        No activity data available
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <h3><i className="fas fa-bell"></i>Recent Security Alerts</h3>
                        {alerts.length > 0 ? (
                            <div style={{maxHeight: '400px', overflowY: 'auto'}}>
                                {alerts.map((alert, index) => (
                                    <div key={index} className={`alert-item ${alert.severity}`}>
                                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start'}}>
                                            <div style={{flex: 1}}>
                                                <div style={{display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px'}}>
                                                    <span className={`risk-score ${alert.severity.toLowerCase()}`} style={{
                                                        background: alert.severity === 'CRITICAL' ? '#ff6b6b' : 
                                                                   alert.severity === 'HIGH' ? '#ffa500' :
                                                                   alert.severity === 'MEDIUM' ? '#ffeb3b' : '#4ecdc4',
                                                        color: alert.severity === 'MEDIUM' ? '#000' : '#fff'
                                                    }}>
                                                        {alert.severity}
                                                    </span>
                                                    <strong>{alert.user_id}</strong>
                                                </div>
                                                <p>{alert.description}</p>
                                                <div className="timestamp">
                                                    {formatTimestamp(alert.timestamp)} • Risk Score: {(alert.risk_score * 100).toFixed(1)}%
                                                </div>
                                            </div>
                                            <i className={`fas ${
                                                alert.severity === 'CRITICAL' ? 'fa-exclamation-triangle' :
                                                alert.severity === 'HIGH' ? 'fa-exclamation-circle' :
                                                alert.severity === 'MEDIUM' ? 'fa-info-circle' : 'fa-check-circle'
                                            }`} style={{
                                                color: alert.severity === 'CRITICAL' ? '#ff6b6b' : 
                                                       alert.severity === 'HIGH' ? '#ffa500' :
                                                       alert.severity === 'MEDIUM' ? '#ffeb3b' : '#4ecdc4',
                                                fontSize: '1.2rem'
                                            }}></i>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div style={{textAlign: 'center', padding: '40px', color: '#b0b0b0'}}>
                                <i className="fas fa-shield-alt" style={{fontSize: '3rem', marginBottom: '15px', color: '#4ecdc4'}}></i>
                                <p>No security alerts at this time</p>
                                <p style={{fontSize: '0.9rem', marginTop: '10px'}}>System is monitoring for threats...</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<InsiderThreatDashboard />, document.getElementById('root'));
